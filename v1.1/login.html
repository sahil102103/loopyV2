<!doctype html>
<html lang="en">
<head>
    <title>Login - FlowCLD</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0e74da, #54c4f7);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Login Container */
        .login-container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 1.5rem;
            color: #0e74da;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: bold;
            text-align: left;
            color: #555;
        }

        input {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0e74da;
            box-shadow: 0 0 4px rgba(14, 116, 218, 0.4);
        }

        button {
            background: #0e74da;
            color: #fff;
            font-size: 1rem;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #054a96;
        }

        /* Error Message */
        #loginError {
            margin-top: 1rem;
            color: red;
            font-weight: bold;
            display: none;
        }

        /* Footer Styling */
        .login-footer {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #555;
        }

        .login-footer a {
            color: #0e74da;
            text-decoration: none;
            font-weight: bold;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Welcome Back to FlowCLD</h1>
        <form id="loginForm">
            <label for="email">Northeastern Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>
        <div id="loginError">Invalid credentials, please try again.</div>
        <div class="login-footer">
            Don’t have an account? <a href="signup.html">Sign up here</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/login.js" type="module"></script>
</body>
</html>
