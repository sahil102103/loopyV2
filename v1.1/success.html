<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    .success-message {
      color: #28a745;
      font-size: 24px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div>
    <h1 class="success-message">Payment Successful!</h1>
    <p>Thank you for your purchase. You now have access to the full version of the app.</p>
    <button onclick="redirectToFullVersion()">Go to Full Version</button>
  </div>

  <script>
    function redirectToFullVersion() {
      // Add a query parameter to indicate we've unlocked full version
      window.location.href = 'http://127.0.0.1:5500/v1.1/index.html?full=1';
    }
  </script>
</body>
</html>
