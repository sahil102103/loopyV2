<!doctype html>
<html>
<head>
    <title>Sign Up - FlowCLD</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css"> <!-- Link to CSS -->
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0e74da, #54c4f7);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Signup Container */
        .signup-container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .signup-container h1 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0e74da;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #555;
        }

        input {
            padding: 0.75rem;
            margin-bottom: 1.25rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #0e74da;
            box-shadow: 0 0 4px rgba(14, 116, 218, 0.4);
        }

        button {
            background: #0e74da;
            color: #fff;
            font-size: 1rem;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #054a96;
        }

        .signup-footer {
            margin-top: 1rem;
            text-align: center;
            color: #555;
        }

        .signup-footer a {
            color: #0e74da;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        /* Error Message */
        #signupError {
            color: red;
            text-align: center;
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Sign Up for FlowCLD</h1>
        <form id="signup-form">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" required>

            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" required>

            <label for="username">User Name</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Northeastern Email</label>
            <input type="email" id="email" name="email" placeholder="example@northeastern.edu" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Sign Up</button>
        </form>
        <div id="signupError">Error: Please check your details and try again.</div>
        <div class="signup-footer">
            Already have an account? <a href="login.html">Log in here</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/signup.js" type="module"></script>
</body>
</html>
