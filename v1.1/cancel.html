<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Not Processed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    .error-message {
      color: #dc3545;
      font-size: 24px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div>
    <h1 class="error-message">Payment Not Processed</h1>
    <p>Your payment was either canceled or could not be processed. Please try again or continue using the regular version of the app.</p>
    <button onclick="redirectToRegularVersion()">Go to Regular Version</button>
  </div>

  <script>
    function redirectToRegularVersion() {
      window.location.href = 'http://127.0.0.1:5500/v1.1/frontend/'; // Update with your app's regular version URL
    }
  </script>
</body>
</html>
