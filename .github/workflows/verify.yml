name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m unittest test_formula_evaluator.py test_graph_validation.py test_app_security.py

  frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check v1.1/js/Libraries/FormulaEvaluator.js
      - run: node --check v1.1/js/Core/Node.js
      - run: node --check v1.1/js/Core/Model.js
      - run: node --check v1.1/js/Libraries/cldEngine.js
